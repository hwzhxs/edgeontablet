<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edge iPad - Copilot Side Pane</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/header.css">
<link rel="stylesheet" href="css/tabs.css">
<link rel="stylesheet" href="css/content.css">
<link rel="stylesheet" href="css/ntp.css">
<link rel="stylesheet" href="css/sidepane.css">
<link rel="stylesheet" href="css/nudge.css">
</head>
<body>

<div class="ipad-frame">

  <!-- ===== HEADER: Status Bar + Tab Bar + Toolbar ===== -->
  <div class="header">

    <!-- Status Bar -->
    <div class="status-bar">
      <div class="status-left">
        <span class="status-time">9:41</span>
        <span class="status-date">Mon Jun 10</span>
      </div>
      <div class="status-right">
        <svg class="status-wifi" viewBox="0 0 16 12" fill="none"><path d="M8 11.5a1.5 1.5 0 100-3 1.5 1.5 0 000 3z" fill="currentColor"/><path d="M4.5 7.2a5 5 0 017 0" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round"/><path d="M2 4a9 9 0 0112 0" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round"/></svg>
        <span class="status-battery-text">100%</span>
        <div class="status-battery">
          <div class="status-battery-body"><div class="status-battery-fill"></div></div>
          <div class="status-battery-cap"></div>
        </div>
      </div>
    </div>

    <!-- Tab Bar (rendered by JS) -->
    <div class="tab-bar" id="tabBar"></div>

    <!-- Shadow separator -->
    <div class="header-shadow"></div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="toolbar-inner">
        <div class="toolbar-avatar">C</div>

        <button class="toolbar-btn nav-back">
          <svg viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="toolbar-btn nav-forward">
          <svg viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>

        <div class="omni-box">
          <div class="omni-center">
            <svg class="omni-lock" viewBox="0 0 14 16" fill="none"><rect x="1.5" y="7" width="11" height="8" rx="2" stroke="currentColor" stroke-width="1.3" fill="none"/><path d="M4 7V5a3 3 0 016 0v2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" fill="none"/></svg>
            <input type="text" class="omni-input" id="omniInput" value="" spellcheck="false" autocomplete="off">
          </div>
          <button class="omni-refresh">
            <svg viewBox="0 0 24 24" fill="none"><path d="M12 4.5C7.86 4.5 4.5 7.86 4.5 12s3.36 7.5 7.5 7.5 7.5-3.36 7.5-7.5c0-.38-.03-.75-.08-1.11-.07-.45.26-.89.72-.89.37 0 .7.26.75.62.07.45.1.91.1 1.38 0 4.97-4.03 9-9 9s-9-4.03-9-9 4.03-9 9-9c2.3 0 4.41.87 6 2.29V4.25c0-.41.34-.75.75-.75s.75.34.75.75V7.25c0 .41-.34.75-.75.75H15.75c-.41 0-.75-.34-.75-.75s.34-.75.75-.75h1.35C15.76 5.26 13.97 4.5 12 4.5z" fill="currentColor"/></svg>
          </button>
        </div>

        <div class="toolbar-right">
          <button class="toolbar-btn btn-share">
            <svg viewBox="0 0 24 24" fill="none"><path d="M12 3v12M5 10l7-7 7 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 17v2a2 2 0 002 2h10a2 2 0 002-2v-2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          </button>
          <button class="toolbar-btn btn-star">
            <svg viewBox="0 0 24 24" fill="none"><path d="M12 2l2.8 5.7 6.3.9-4.6 4.5 1.1 6.3L12 16.3l-5.6 3.1 1.1-6.3L3 8.6l6.3-.9L12 2z" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linejoin="round"/></svg>
          </button>
          <button class="toolbar-btn btn-tabs" id="btnTabCount">
            <svg viewBox="0 0 24 24" fill="none"><rect x="3.5" y="3.5" width="17" height="17" rx="3" stroke="currentColor" stroke-width="1.6"/></svg>
            <span class="toolbar-tab-count" id="tabCount">0</span>
          </button>
          <button class="toolbar-btn btn-menu">
            <svg viewBox="0 0 24 24" fill="none"><path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          </button>

          <!-- Nudge button -->
          <div class="nudge" id="nudge">
            <div class="nudge-icon">
              <svg viewBox="0 0 28 28" fill="none"><path d="M17.07 3.66c-.29-.99-1.19-1.66-2.22-1.66h-.68c-1.12 0-2.07.8-2.28 1.9l-1.18 6.42.32-1.1c.29-.99 1.19-1.67 2.22-1.67h3.92l1.65.64 1.59-.64h-.46c-1.03 0-1.93-.68-2.22-1.66l-.66-2.23z" fill="url(#n0)"/><path d="M7.17 20.33c.29.99 1.19 1.67 2.22 1.67h1.45c1.25 0 2.27-.99 2.31-2.24l.22-6.34-.41 1.37c-.29.98-1.19 1.66-2.22 1.66H6.79l-1.41-.77-1.53.77h.46c1.03 0 1.94.68 2.23 1.67l.63 2.21z" fill="url(#n1)"/><path d="M14.75 2H6.73c-2.29 0-3.67 3.03-4.58 6.06C1.06 11.64-.36 16.44 3.75 16.44h3.46c1.04 0 1.94-.68 2.23-1.68.6-2.11 1.66-5.78 2.49-8.58.42-1.42.77-2.64 1.31-3.4.3-.43.8-.78 1.51-.78z" fill="url(#n2)"/><path d="M14.75 2H6.73c-2.29 0-3.67 3.03-4.58 6.06C1.06 11.64-.36 16.44 3.75 16.44h3.46c1.04 0 1.94-.68 2.23-1.68.6-2.11 1.66-5.78 2.49-8.58.42-1.42.77-2.64 1.31-3.4.3-.43.8-.78 1.51-.78z" fill="url(#n3)"/><path d="M9.25 22h8.02c2.29 0 3.69-3.03 4.58-6.06 1.09-3.59 2.51-8.38-1.6-8.38h-3.46c-1.04 0-1.94.68-2.23 1.68-.6 2.1-1.66 5.78-2.49 8.58-.42 1.42-.77 2.64-1.31 3.4-.3.43-.8.78-1.51.78z" fill="url(#n4)"/><path d="M9.25 22h8.02c2.29 0 3.69-3.03 4.58-6.06 1.09-3.59 2.51-8.38-1.6-8.38h-3.46c-1.04 0-1.94.68-2.23 1.68-.6 2.1-1.66 5.78-2.49 8.58-.42 1.42-.77 2.64-1.31 3.4-.3.43-.8.78-1.51.78z" fill="url(#n5)"/><defs><radialGradient id="n0" cx="0" cy="0" r="1" gradientTransform="matrix(-5.5 -6.79 -5.94 5.7 19 10.38)" gradientUnits="userSpaceOnUse"><stop offset=".1" stop-color="#00AEFF"/><stop offset=".77" stop-color="#2253CE"/><stop offset="1" stop-color="#0736C4"/></radialGradient><radialGradient id="n1" cx="0" cy="0" r="1" gradientTransform="matrix(4.98 6.47 5.88 -5.28 5.58 16.25)" gradientUnits="userSpaceOnUse"><stop stop-color="#FFB657"/><stop offset=".63" stop-color="#FF5F3D"/><stop offset=".92" stop-color="#C02B3C"/></radialGradient><linearGradient id="n2" x1="6.25" y1="3.75" x2="7.39" y2="16.99" gradientUnits="userSpaceOnUse"><stop offset=".16" stop-color="#0D91E1"/><stop offset=".49" stop-color="#52B471"/><stop offset=".65" stop-color="#98BD42"/><stop offset=".94" stop-color="#FFC800"/></linearGradient><linearGradient id="n3" x1="7.25" y1="2" x2="7.88" y2="16.44" gradientUnits="userSpaceOnUse"><stop stop-color="#3DCBFF"/><stop offset=".25" stop-color="#0588F7" stop-opacity="0"/></linearGradient><radialGradient id="n4" cx="0" cy="0" r="1" gradientTransform="matrix(-6.34 18.11 -21.56 -7.99 20.66 6.15)" gradientUnits="userSpaceOnUse"><stop offset=".07" stop-color="#8C48FF"/><stop offset=".5" stop-color="#F2598A"/><stop offset=".9" stop-color="#FFB152"/></radialGradient><linearGradient id="n5" x1="21.29" y1="6.68" x2="21.29" y2="10.61" gradientUnits="userSpaceOnUse"><stop offset=".06" stop-color="#F8ADFA"/><stop offset=".71" stop-color="#A86EDD" stop-opacity="0"/></linearGradient></defs></svg>
            </div>
            <div class="nudge-text-wrap">
              <span class="nudge-text nudge-text-short">Chat</span>
              <span class="nudge-text nudge-text-long">Summarize</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== CONTENT AREA ===== -->
  <div class="content-area" id="contentArea">
    <div class="page-content" id="pageContent">
      <!-- NTP: Copilot New Tab Page -->
      <div class="ntp" id="ntpPage">
        <!-- NTP Top Bar: Weather + Settings -->
        <div class="ntp-topbar">
          <div class="ntp-weather">
            <span class="ntp-weather-icon">☀️</span>
            <span class="ntp-weather-temp">34°C</span>
          </div>
          <button class="ntp-settings-btn" title="Customize" id="ntpSettingsBtn">
            <svg viewBox="0 0 20 20" fill="none">
              <line x1="3" y1="7" x2="17" y2="7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="3" y1="13" x2="17" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <circle cx="7" cy="7" r="2" fill="#F8F4F1" stroke="currentColor" stroke-width="1.5"/>
              <circle cx="13" cy="13" r="2" fill="#F8F4F1" stroke="currentColor" stroke-width="1.5"/>
            </svg>
          </button>
          <!-- Settings Panel -->
          <div class="ntp-settings-panel" id="ntpSettingsPanel">
            <div class="ntp-settings-title">Nudge Customization</div>
            <div class="ntp-settings-row">
              <label class="ntp-settings-label">Nudge Highlight Color</label>
              <div class="ntp-settings-colors" id="nudgeColorOptions">
                <button class="ntp-color-swatch" data-color="rgba(0,0,0,0.05)" style="background:rgba(0,0,0,0.1)" title="Default"></button>
                <button class="ntp-color-swatch active" data-color="rgba(255,176,0,0.25)" style="background:rgba(255,176,0,0.5)" title="Copilot Gold"></button>
                <button class="ntp-color-swatch" data-color="rgba(88,64,255,0.18)" style="background:rgba(88,64,255,0.35)" title="Purple"></button>
                <button class="ntp-color-swatch" data-color="rgba(242,89,138,0.18)" style="background:rgba(242,89,138,0.35)" title="Pink"></button>
                <button class="ntp-color-swatch" data-color="rgba(0,174,255,0.18)" style="background:rgba(0,174,255,0.35)" title="Cyan"></button>
              </div>
            </div>
          </div>
        </div>

        <div class="ntp-content">
          <!-- Greeting -->
          <div class="ntp-greeting">Hi, ask me anything or let's find it online</div>

          <!-- Composer + QuickLinks -->
          <div class="ntp-composer-wrap">
            <!-- Composer -->
            <div class="ntp-composer-outer">
              <div class="ntp-composer-inner">
                <div class="ntp-composer-input-wrap">
                  <input type="text" class="ntp-composer-input" id="ntpSearchInput" placeholder="Ask me anything...">
                </div>
                <div class="ntp-composer-controls">
                  <div class="ntp-composer-controls-group">
                    <!-- Add button with circle border -->
                    <button class="ntp-composer-btn ntp-btn-circle" title="Add">
                      <svg viewBox="0 0 20 20" fill="none"><path d="M10 5v10M5 10h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                    </button>
                    <!-- Smart dropdown with pill border -->
                    <button class="ntp-composer-btn ntp-btn-pill" title="Smart">
                      <span class="ntp-btn-pill-text">Smart</span>
                      <svg viewBox="0 0 8 5" fill="none"><path d="M1 1l3 3 3-3" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </button>
                  </div>
                  <div class="ntp-composer-controls-group">
                    <!-- Voice / sound wave button -->
                    <button class="ntp-composer-btn ntp-btn-voice" title="Voice">
                      <svg viewBox="0 0 16 18" fill="none"><path d="M2 7v4M5 4v10M8 1v16M11 4v10M14 7v4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
                    </button>
                  </div>
                </div>
              </div>
            </div>

            <!-- QuickLinks -->
            <div class="ntp-topsites">
              <div class="ntp-site" data-url="https://www.youtube.com">
                <div class="ntp-site-logo">
                  <svg viewBox="0 0 24 24" fill="none"><path d="M23.5 6.5a3 3 0 00-2.1-2.1C19.5 4 12 4 12 4s-7.5 0-9.4.4A3 3 0 00.5 6.5 31 31 0 000 12a31 31 0 00.5 5.5 3 3 0 002.1 2.1c1.9.4 9.4.4 9.4.4s7.5 0 9.4-.4a3 3 0 002.1-2.1A31 31 0 0024 12a31 31 0 00-.5-5.5z" fill="#FF0000"/><path d="M9.75 15.02l6.25-3.52-6.25-3.52v7.04z" fill="#FFF"/></svg>
                </div>
                <span class="ntp-site-title">YouTube</span>
              </div>
              <div class="ntp-site" data-url="https://www.office.com">
                <div class="ntp-site-logo">
                  <svg viewBox="0 0 24 24" fill="none"><path d="M8 2l8 2v16l-8 2V2z" fill="#EB3C00"/><path d="M16 4l4 1v14l-4 1V4z" fill="#FF6D00"/><path d="M8 2L2 4v16l6 2V2z" fill="#D83B01"/></svg>
                </div>
                <span class="ntp-site-title">Microsoft 365</span>
              </div>
              <div class="ntp-site" data-url="https://www.facebook.com">
                <div class="ntp-site-logo">
                  <svg viewBox="0 0 24 24" fill="none"><path d="M24 12c0-6.627-5.373-12-12-12S0 5.373 0 12c0 5.99 4.388 10.954 10.125 11.854V15.47H7.078V12h3.047V9.356c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.926-1.956 1.874V12h3.328l-.532 3.469h-2.796v8.385C19.612 22.954 24 17.99 24 12z" fill="#1877F2"/></svg>
                </div>
                <span class="ntp-site-title">Facebook</span>
              </div>
              <div class="ntp-site" data-url="https://medium.com/@myscale/agentic-ai-vs-generative-ai-understanding-the-key-differences-e3607e750a20" data-url-local="pages/medium-article.html">
                <div class="ntp-site-logo">
                  <svg viewBox="0 0 24 24" fill="none"><path d="M13.54 12a6.8 6.8 0 01-6.77 6.82A6.8 6.8 0 010 12a6.8 6.8 0 016.77-6.82A6.8 6.8 0 0113.54 12zM20.96 12c0 3.54-1.51 6.42-3.38 6.42-1.87 0-3.39-2.88-3.39-6.42s1.52-6.42 3.39-6.42 3.38 2.88 3.38 6.42zM24 12c0 3.17-.53 5.75-1.19 5.75-.66 0-1.19-2.58-1.19-5.75s.53-5.75 1.19-5.75C23.47 6.25 24 8.83 24 12z" fill="#242424"/></svg>
                </div>
                <span class="ntp-site-title">Medium</span>
              </div>
              <div class="ntp-site" data-url="https://outlook.live.com">
                <div class="ntp-site-logo">
                  <svg viewBox="0 0 24 24" fill="none"><path d="M12 2L2 6v12l10 4 10-4V6L12 2z" fill="#0078D4"/><path d="M12 2L2 6v12l10-4V2z" fill="#0364B8"/><path d="M12 14L2 18l10 4V14z" fill="#28A8EA"/></svg>
                </div>
                <span class="ntp-site-title">Outlook</span>
              </div>
              <div class="ntp-site ntp-site-add">
                <div class="ntp-site-logo">
                  <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
                </div>
                <span class="ntp-site-title">Add</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Webview (Electron) / iframe (browser): shown when tab has a URL -->
      <webview id="pageFrameWebview" class="page-frame" src="about:blank" allowpopups style="display:none"></webview>
      <iframe id="pageFrameIframe" class="page-frame" src="about:blank" style="display:none; border:none; width:100%; height:100%;" sandbox="allow-scripts allow-same-origin allow-forms allow-popups" referrerpolicy="no-referrer"></iframe>
    </div>

    <!-- Copilot Side Pane -->
    <div class="side-pane" id="sidePane">
      <div class="side-pane-inner">
        <div class="sp-header">
          <div class="sp-header-left"></div>
          <div class="sp-header-center">
            <svg class="sp-copilot-icon" viewBox="0 0 24 24" fill="none"><path d="M17.07 3.66c-.29-.99-1.19-1.66-2.22-1.66h-.68c-1.12 0-2.07.8-2.28 1.9l-1.18 6.42.32-1.1c.29-.99 1.19-1.67 2.22-1.67h3.92l1.65.64 1.59-.64h-.46c-1.03 0-1.93-.68-2.22-1.66l-.66-2.23z" fill="url(#sp0)"/><path d="M7.17 20.33c.29.99 1.19 1.67 2.22 1.67h1.45c1.25 0 2.27-.99 2.31-2.24l.22-6.34-.41 1.37c-.29.98-1.19 1.66-2.22 1.66H6.79l-1.41-.77-1.53.77h.46c1.03 0 1.94.68 2.23 1.67l.63 2.21z" fill="url(#sp1)"/><path d="M14.75 2H6.73c-2.29 0-3.67 3.03-4.58 6.06C1.06 11.64-.36 16.44 3.75 16.44h3.46c1.04 0 1.94-.68 2.23-1.68.6-2.11 1.66-5.78 2.49-8.58.42-1.42.77-2.64 1.31-3.4.3-.43.8-.78 1.51-.78z" fill="url(#sp2)"/><path d="M14.75 2H6.73c-2.29 0-3.67 3.03-4.58 6.06C1.06 11.64-.36 16.44 3.75 16.44h3.46c1.04 0 1.94-.68 2.23-1.68.6-2.11 1.66-5.78 2.49-8.58.42-1.42.77-2.64 1.31-3.4.3-.43.8-.78 1.51-.78z" fill="url(#sp3)"/><path d="M9.25 22h8.02c2.29 0 3.69-3.03 4.58-6.06 1.09-3.59 2.51-8.38-1.6-8.38h-3.46c-1.04 0-1.94.68-2.23 1.68-.6 2.1-1.66 5.78-2.49 8.58-.42 1.42-.77 2.64-1.31 3.4-.3.43-.8.78-1.51.78z" fill="url(#sp4)"/><path d="M9.25 22h8.02c2.29 0 3.69-3.03 4.58-6.06 1.09-3.59 2.51-8.38-1.6-8.38h-3.46c-1.04 0-1.94.68-2.23 1.68-.6 2.1-1.66 5.78-2.49 8.58-.42 1.42-.77 2.64-1.31 3.4-.3.43-.8.78-1.51.78z" fill="url(#sp5)"/><defs><radialGradient id="sp0" cx="0" cy="0" r="1" gradientTransform="matrix(-5.5 -6.79 -5.94 5.7 19 10.38)" gradientUnits="userSpaceOnUse"><stop offset=".1" stop-color="#00AEFF"/><stop offset=".77" stop-color="#2253CE"/><stop offset="1" stop-color="#0736C4"/></radialGradient><radialGradient id="sp1" cx="0" cy="0" r="1" gradientTransform="matrix(4.98 6.47 5.88 -5.28 5.58 16.25)" gradientUnits="userSpaceOnUse"><stop stop-color="#FFB657"/><stop offset=".63" stop-color="#FF5F3D"/><stop offset=".92" stop-color="#C02B3C"/></radialGradient><linearGradient id="sp2" x1="6.25" y1="3.75" x2="7.39" y2="16.99" gradientUnits="userSpaceOnUse"><stop offset=".16" stop-color="#0D91E1"/><stop offset=".49" stop-color="#52B471"/><stop offset=".65" stop-color="#98BD42"/><stop offset=".94" stop-color="#FFC800"/></linearGradient><linearGradient id="sp3" x1="7.25" y1="2" x2="7.88" y2="16.44" gradientUnits="userSpaceOnUse"><stop stop-color="#3DCBFF"/><stop offset=".25" stop-color="#0588F7" stop-opacity="0"/></linearGradient><radialGradient id="sp4" cx="0" cy="0" r="1" gradientTransform="matrix(-6.34 18.11 -21.56 -7.99 20.66 6.15)" gradientUnits="userSpaceOnUse"><stop offset=".07" stop-color="#8C48FF"/><stop offset=".5" stop-color="#F2598A"/><stop offset=".9" stop-color="#FFB152"/></radialGradient><linearGradient id="sp5" x1="21.29" y1="6.68" x2="21.29" y2="10.61" gradientUnits="userSpaceOnUse"><stop offset=".06" stop-color="#F8ADFA"/><stop offset=".71" stop-color="#A86EDD" stop-opacity="0"/></linearGradient></defs></svg>
            <span class="sp-header-title">Copilot</span>
          </div>
          <button class="sp-close" id="spClose">
            <svg viewBox="0 0 24 24" fill="none"><path d="M6.4 18L5 16.6 10.6 11 5 5.4 6.4 4 12 9.6 17.6 4 19 5.4 13.4 11 19 16.6 17.6 18 12 12.4z" fill="currentColor"/></svg>
          </button>
        </div>
        <div class="sp-chat" id="spChat">
          <div class="sp-msg sp-msg-user">
            <div class="sp-msg-bubble">summarize this webpage</div>
          </div>
          <div class="sp-msg sp-msg-ai">
            <div class="sp-msg-content" id="spAiResponse"></div>
          </div>
        </div>
        <div class="sp-suggestions" id="spSuggestions">
          <button class="sp-chip">How can I amplify my voice?</button>
          <button class="sp-chip">What confidence-building tips can I apply?</button>
          <button class="sp-chip">How can I practice visualization exercises?</button>
        </div>
        <div class="sp-composer">
          <div class="sp-composer-inner">
            <div class="sp-composer-left">
              <button class="sp-composer-btn sp-btn-plus">
